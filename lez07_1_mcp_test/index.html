<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Directory Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-xl">
      <span class="navbar-brand fw-bold fs-5">
        <i class="bi bi-building-fill me-2"></i>Company Directory
      </span>
      <span class="text-white opacity-75 small">Last updated: 2026-05-15</span>
    </div>
  </nav>

  <div class="container-xl py-4">

    <!-- Summary Cards -->
    <div id="summary-cards" class="row g-3 mb-5"></div>

    <!-- Department Cards -->
    <h6 class="section-title"><i class="bi bi-diagram-3-fill me-2"></i>Departments</h6>
    <div id="dept-cards" class="row g-3 mb-5"></div>

    <!-- Employees Table -->
    <div class="card shadow-sm mb-5">
      <div class="card-header bg-white border-bottom d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-people-fill me-2 text-primary"></i>Employees</h6>
        <div class="input-group input-group-sm" style="max-width:280px">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input id="search-input" type="text" class="form-control border-start-0"
                 placeholder="Search name, title, dept…" />
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="text-muted fw-medium">Code</th>
              <th class="text-muted fw-medium">Name</th>
              <th class="text-muted fw-medium">Job Title</th>
              <th class="text-muted fw-medium">Department</th>
              <th class="text-muted fw-medium">Location</th>
              <th class="text-muted fw-medium">Hire Date</th>
              <th class="text-muted fw-medium">Status</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Managers & Direct Reports -->
    <h6 class="section-title"><i class="bi bi-person-lines-fill me-2"></i>Managers &amp; Direct Reports</h6>
    <div id="manager-cards" class="row g-3 mb-5"></div>

  </div>

  <footer class="text-center text-muted small py-3 border-top bg-white">
    Company Directory Dashboard &mdash; Static build from MCP data &middot; 2026-05-15
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
